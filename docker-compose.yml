services:
  db:
    image: postgres:16-alpine
    restart: always
    container_name: pm-postgres
    environment:
      POSTGRES_DB: pm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d pm_db']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm-server
    env_file:
      - .env
    environment:
      PORT: 5555
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pm_db
    ports:
      - '5555:5555'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: npm run start:dev

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    container_name: pm-pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin4
    ports:
      - '5050:80'
    depends_on:
      db:
        condition: service_healthy
